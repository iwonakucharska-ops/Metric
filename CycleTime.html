<style>

    --accent: #5b8af4;

    --small-bg: rgba(34,197,94,0.10);
    --medium: #f97316;
    --medium-bg: rgba(249,115,22,0.10);
    --large: #ef4444;
    --large-bg: rgba(239,68,68,0.10);

    --p85: #a78bfa;
    --p95: #f472b6;

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px 32px 60px;
  }

  header {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 28px;
  }
  header .eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent);
  }
  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(26px, 4vw, 40px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: #fff;
  }
  header p {
    font-size: 14px;
    color: var(--muted);
    margin-top: 4px;
    font-weight: 300;
  }

  /* STATS ROW */
  .stats-row {
    display: flex;
    gap: 12px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 22px;
    min-width: 130px;
    flex: 1;
  }
  .stat-card .label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .stat-card .value {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
  }
  .stat-card .unit {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* SIZE LEGEND */
  .legend {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-family: 'DM Mono', monospace;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
  }
  .legend-line {
    width: 28px; height: 2px;
    display: inline-block;
  }
  .legend-sep { color: var(--border); font-size: 18px; }

  /* CHART AREA */
  .chart-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 24px 20px;
    margin-bottom: 28px;
  }
  .chart-title {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 20px;
    letter-spacing: -0.01em;
  }

  /* SCATTER PLOT */
  #scatter-container {
    position: relative;
    width: 100%;
    height: 340px;
  }
  #scatter-container svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* DISTRIBUTION */
  #dist-container {
    position: relative;
    width: 100%;
    height: 220px;
  }
  #dist-container svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }

  /* TOOLTIP */
  .tooltip {
    position: fixed;
    background: #1a1f2e;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    font-size: 13px;
    z-index: 100;
    max-width: 260px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip .tt-header {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 6px;
  }
  .tooltip .tt-row {
    font-size: 12px;
    color: var(--muted);
    margin-top: 3px;
    display: flex;
    gap: 6px;
  }
  .tooltip .tt-row span:first-child { color: #aaa; }

  /* DATA TABLE */
  .table-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .table-header {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .table-header h2 {
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .filter-btns {
    display: flex;
    gap: 6px;
  }
  .filter-btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    background: #0f1218;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 16px;
    text-align: left;
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  tbody tr {

  }
  tbody tr:hover { background: rgba(91,138,244,0.04); }
  tbody tr:last-child { border-bottom: none; }
  td {
    padding: 10px 16px;
    vertical-align: middle;
  }
  td.num {
    font-family: 'DM Mono', monospace;
    text-align: right;
  }

  .badge {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.05em;

  .badge-small { background: var(--small-bg); color: var(--small); }

  .lead-bar {

    align-items: center;
    gap: 10px;

  .lead-bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;

// SCATTER CHART
function drawScatter() {
  const svg = document.getElementById('scatter-svg');
  const W = svg.parentElement.clientWidth;
  const H = 340;
  const PAD = { top: 20, right: 20, bottom: 40, left: 52 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const sorted = [...DATA].sort((a,b)=>a.lead_time-b.lead_time);
  const n = sorted.length;

  const xScale = i => PAD.left + (i / (n-1)) * plotW;
  const yScale = v => PAD.top + plotH - (v / 160) * plotH;

  let html = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;

  // Grid lines
  [0,20,40,60,80,100,120,140,160].forEach(v => {
    const y = yScale(v);
    html += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#1e2330" stroke-width="1"/>`;
    html += `<text x="${PAD.left-6}" y="${y+4}" text-anchor="end" fill="#4b5563" font-size="11" font-family="DM Mono,monospace">${v}</text>`;
  });

  // X axis label
  html += `<text x="${PAD.left}" y="${H-6}" fill="#4b5563" font-size="11" font-family="DM Mono,monospace">0</text>`;
  html += `<text x="${W-PAD.right}" y="${H-6}" fill="#4b5563" font-size="11" font-family="DM Mono,monospace" text-anchor="end">${n}</text>`;

  // Shaded zones
  const zones = [
    {from:0,to:15,color:'rgba(34,197,94,0.04)'},
    {from:15,to:45,color:'rgba(249,115,22,0.04)'},
    {from:45,to:160,color:'rgba(239,68,68,0.04)'}
  ];
  zones.forEach(z => {
    const y1 = yScale(z.to), y2 = yScale(z.from);
    html += `<rect x="${PAD.left}" y="${y1}" width="${plotW}" height="${y2-y1}" fill="${z.color}"/>`;
  });

  // Percentile lines
  const plines = [
    {v:P50,color:'#facc15',label:'P50'},
    {v:P85,color:'#a78bfa',label:'P85'},
    {v:P95,color:'#f472b6',label:'P95'}
  ];
  plines.forEach(p => {
    const y = yScale(p.v);
    html += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="${p.color}" stroke-width="1.5" stroke-dasharray="5,4"/>`;
    html += `<text x="${W-PAD.right+4}" y="${y+4}" fill="${p.color}" font-size="11" font-family="DM Mono,monospace">${p.label}</text>`;
  });

  // Dots
  sorted.forEach((d, i) => {
    const x = xScale(i);
    const y = yScale(d.lead_time);
    const c = COLOR[d.size];
    html += `<circle cx="${x}" cy="${y}" r="7" fill="${c}" fill-opacity="0.18" stroke="${c}" stroke-width="1.5"
      class="scatter-dot"
      data-idx="${d.index}" data-typ="${d.typ}" data-prio="${d.priorytet}" data-etap="${d.etap}"
      data-ip="${d.ip}" data-closed="${d.closed}" data-lt="${d.lead_time}" data-size="${d.size}"
      data-color="${c}"
      style="cursor:pointer;transition:r 0.15s,fill-opacity 0.15s"/>`;
  });

  // Axis
  html += `<line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+plotH}" stroke="#2a3040" stroke-width="1"/>`;
  html += `<line x1="${PAD.left}" y1="${PAD.top+plotH}" x2="${W-PAD.right}" y2="${PAD.top+plotH}" stroke="#2a3040" stroke-width="1"/>`;

  // Y axis label
  html += `<text x="14" y="${PAD.top+plotH/2}" fill="#4b5563" font-size="11" font-family="DM Mono,monospace" transform="rotate(-90,14,${PAD.top+plotH/2})" text-anchor="middle">Days</text>`;
  html += `<text x="${PAD.left+plotW/2}" y="${H-6}" fill="#4b5563" font-size="11" font-family="DM Mono,monospace" text-anchor="middle">Items (sorted by lead time)</text>`;

  html += '</svg>';
  svg.outerHTML = `<svg id="scatter-svg">${html.replace('<svg viewBox','<svg id="scatter-svg" viewBox').split('<svg id="scatter-svg">')[1]}`;
  document.getElementById('scatter-svg').innerHTML = html.match(/<svg[^>]*>([\s\S]*)<\/svg>/)[1];
  document.getElementById('scatter-svg').setAttribute('viewBox', `0 0 ${W} ${H}`);

  // reattach events
  document.querySelectorAll('.scatter-dot').forEach(dot => {
    dot.addEventListener('mouseenter', e => showTooltip(e, dot));
    dot.addEventListener('mousemove', e => moveTooltip(e));
    dot.addEventListener('mouseleave', hideTooltip);
  });
}

// HISTOGRAM
function drawHistogram() {
  const svg = document.getElementById('dist-svg');
  const W = svg.parentElement.clientWidth;
  const H = 220;
  const PAD = { top: 16, right: 20, bottom: 40, left: 52 };
  const plotW = W - PAD.left - PAD.right;
  const plotH = H - PAD.top - PAD.bottom;

  const binSize = 10;
  const bins = {};
  for (let b = 0; b <= 150; b+=binSize) bins[b] = [];
  DATA.forEach(d => {
    const b = Math.floor(d.lead_time/binSize)*binSize;
    if (bins[b] !== undefined) bins[b].push(d);
  });

  const binKeys = Object.keys(bins).map(Number);
  const maxCount = Math.max(...Object.values(bins).map(a=>a.length));
  const n = binKeys.length;

  const xScale = i => PAD.left + (i / n) * plotW;
  const yScale = v => PAD.top + plotH - (v / (maxCount+1)) * plotH;
  const barW = plotW / n - 2;

  let html = '';

  // Grid
  for (let v=0; v<=maxCount; v++) {
    if (v % 2 === 0) {
      const y = yScale(v);
      html += `<line x1="${PAD.left}" y1="${y}" x2="${W-PAD.right}" y2="${y}" stroke="#1e2330" stroke-width="1"/>`;
      html += `<text x="${PAD.left-6}" y="${y+4}" text-anchor="end" fill="#4b5563" font-size="11" font-family="DM Mono,monospace">${v}</text>`;
    }
  }

  // Bars
  binKeys.forEach((b, i) => {
    const items = bins[b];
    if (items.length === 0) return;
    const x = xScale(i) + 1;
    const barHeight = (items.length / (maxCount+1)) * plotH;
    const y = PAD.top + plotH - barHeight;

    // color by dominant size in bin
    const sizeCounts = {Small:0,Medium:0,Large:0};
    items.forEach(d=>sizeCounts[d.size]++);
    const dom = Object.keys(sizeCounts).sort((a,b)=>sizeCounts[b]-sizeCounts[a])[0];
    const c = COLOR[dom];

    html += `<rect x="${x}" y="${y}" width="${barW}" height="${barHeight}" fill="${c}" fill-opacity="0.25" rx="3"/>`;
    html += `<rect x="${x}" y="${y}" width="${barW}" height="3" fill="${c}" rx="1"/>`;

    // x label
    html += `<text x="${x+barW/2}" y="${PAD.top+plotH+14}" text-anchor="middle" fill="#4b5563" font-size="10" font-family="DM Mono,monospace">${b}</text>`;
  });

  // Percentile lines
  const plines = [
    {v:P50,color:'#facc15',label:'P50'},
    {v:P85,color:'#a78bfa',label:'P85'},
    {v:P95,color:'#f472b6',label:'P95'}
  ];
  plines.forEach(p => {
    const xPct = PAD.left + (p.v / 160) * plotW;
    html += `<line x1="${xPct}" y1="${PAD.top}" x2="${xPct}" y2="${PAD.top+plotH}" stroke="${p.color}" stroke-width="1.5" stroke-dasharray="5,4"/>`;
    html += `<text x="${xPct+3}" y="${PAD.top+12}" fill="${p.color}" font-size="10" font-family="DM Mono,monospace">${p.label}</text>`;
  });

  // Axes
  html += `<line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top+plotH}" stroke="#2a3040" stroke-width="1"/>`;
  html += `<line x1="${PAD.left}" y1="${PAD.top+plotH}" x2="${W-PAD.right}" y2="${PAD.top+plotH}" stroke="#2a3040" stroke-width="1"/>`;
  html += `<text x="14" y="${PAD.top+plotH/2}" fill="#4b5563" font-size="11" font-family="DM Mono,monospace" transform="rotate(-90,14,${PAD.top+plotH/2})" text-anchor="middle">Count</text>`;
  html += `<text x="${PAD.left+plotW/2}" y="${H-4}" fill="#4b5563" font-size="11" font-family="DM Mono,monospace" text-anchor="middle">Lead Time (days)</text>`;

  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.innerHTML = html;
}

// TOOLTIP
const tooltip = document.getElementById('tooltip');
function showTooltip(e, dot) {
  const c = dot.dataset.color;
  tooltip.innerHTML = `
    <div class="tt-header">#${dot.dataset.idx} · ${dot.dataset.typ}</div>
    <div class="tt-lead" style="color:${c}">${dot.dataset.lt} days</div>
    <div class="tt-row"><span>Size</span><span style="color:${c}">${dot.dataset.size}</span></div>
    <div class="tt-row"><span>Priority</span><span>${dot.dataset.prio}</span></div>
    <div class="tt-row"><span>Stage</span><span>${dot.dataset.etap}</span></div>
    <div class="tt-row"><span>In Progress</span><span>${dot.dataset.ip}</span></div>
    <div class="tt-row"><span>Closed</span><span>${dot.dataset.closed}</span></div>
  `;
  tooltip.classList.add('visible');
  moveTooltip(e);
  dot.setAttribute('r','10');
  dot.setAttribute('fill-opacity','0.5');
}
function moveTooltip(e) {
  let x = e.clientX + 14, y = e.clientY + 14;
  if (x + 270 > window.innerWidth) x = e.clientX - 280;
  if (y + 180 > window.innerHeight) y = e.clientY - 190;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}
function hideTooltip(e) {
  tooltip.classList.remove('visible');
  e.target.setAttribute('r','7');
  e.target.setAttribute('fill-opacity','0.18');
}

// TABLE
function renderTable(filter) {
  const body = document.getElementById('table-body');
  const items = filter === 'all' ? DATA : DATA.filter(d=>d.size===filter);
  body.innerHTML = items.map(d => {
    const c = COLOR[d.size];
    const pct = Math.round((d.lead_time / MAX_LT) * 100);
    return `
      <tr data-size="${d.size}">
        <td style="color:var(--muted);font-family:'DM Mono',monospace;font-size:11px">${d.index}</td>
        <td><span class="badge ${d.typ==='Bug'?'badge-bug':'badge-type'}">${d.typ}</span></td>
        <td style="font-size:12px;color:#9ca3af">${d.priorytet}</td>
        <td style="font-size:12px;color:#6b7280">${d.etap}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;color:#6b7280">${d.ip}</td>
        <td style="font-family:'DM Mono',monospace;font-size:12px;color:#6b7280">${d.closed}</td>
        <td>
          <div class="lead-bar">
            <div class="lead-bar-track">
              <div class="lead-bar-fill" style="width:${pct}%;background:${c}"></div>
            </div>
            <div class="lead-val" style="color:${c}">${d.lead_time}d</div>
          </div>
        </td>
        <td><span class="badge badge-${d.size.toLowerCase()}">${d.size}</span></td>
      </tr>`;
  }).join('');
}

function filterTable(f, btn) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTable(f);
}

// INIT
renderTable('all');
drawScatter();
drawHistogram();

window.addEventListener('resize', () => {
  drawScatter();
  drawHistogram();
});
</script>
